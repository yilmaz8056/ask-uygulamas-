<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Benim Biriciğim | Premium</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0b10">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div id="hearts-overlay"></div>

    <div class="app-container" id="main-app">
        
        <!-- Premium Header -->
        <header class="premium-header">
            <h1>Hoş geldin Biriciğim...</h1>
            <p id="today-date-text">Seninle her gün yeni bir masal. 💕</p>
        </header>

        <!-- Dynamic Content Area -->
        <main style="display: flex; flex-direction: column; gap: 24px;">

            <!-- Geri Sayım Kartı -->
            <section class="premium-card" id="countdown-card">
                <div class="card-title"><i class="fa-solid fa-hourglass-half"></i> <span id="countdown-title">Kavuşmamıza</span></div>
                <div class="countdown-grid">
                    <div class="time-box"><span id="cd-days">0</span><small>Gün</small></div>
                    <div class="time-box"><span id="cd-hours">00</span><small>Saat</small></div>
                    <div class="time-box"><span id="cd-mins">00</span><small>Dak</small></div>
                    <div class="time-box"><span id="cd-secs">00</span><small>Sn</small></div>
                </div>
                <button id="countdown-edit-btn" style="position:absolute; top:24px; right:24px; border:none; background:none; color:var(--text-dim); cursor:pointer;"><i class="fa-solid fa-pen"></i></button>
            </section>

            <!-- Hızlı Aksiyonlar -->
            <section style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <button class="action-btn" id="generate-btn" style="font-size: 14px; padding: 15px;">
                    <i class="fa-solid fa-sparkles"></i> Sevgi Notu
                </button>
                <button class="action-btn" id="date-btn" style="font-size: 14px; padding: 15px; background: var(--surface-light); box-shadow: none;">
                    <i class="fa-solid fa-mug-hot"></i> Plan Yapalım
                </button>
            </section>

            <!-- Sevgi Notu Görüntüleme -->
            <div id="quote-display" class="premium-card hidden" style="border-left: 4px solid var(--accent);">
                <p id="quote-text" style="font-style: italic; font-size: 17px;"></p>
            </div>

            <!-- Date Idea Görüntüleme -->
            <div id="date-display" class="premium-card hidden" style="border-left: 4px solid var(--secondary);">
                <p id="date-text" style="font-weight: 600; font-size: 17px;"></p>
            </div>

            <!-- Ruh Hali Takipçisi -->
            <section class="premium-card">
                <div class="card-title"><i class="fa-solid fa-face-smile-beam"></i> Ruh Halin</div>
                <div class="mood-grid" id="mood-emojis">
                    <button class="mood-btn" data-mood="mutlu">😍</button>
                    <button class="mood-btn" data-mood="huzurlu">😊</button>
                    <button class="mood-btn" data-mood="normal">😐</button>
                    <button class="mood-btn" data-mood="üzgün">😢</button>
                    <button class="mood-btn" data-mood="kızgın">😤</button>
                </div>
                <p id="mood-status" class="text-center" style="margin-top: 15px; font-size: 14px; color: var(--text-dim);"></p>
            </section>

            <!-- Anılarımız Slider -->
            <section class="premium-card">
                <div class="card-title" style="justify-content: space-between;">
                    <span><i class="fa-solid fa-camera-retro"></i> Anılarımız</span>
                    <label for="polaroid-upload" style="cursor:pointer; color:var(--accent); font-size: 20px;"><i class="fa-solid fa-plus-circle"></i></label>
                    <input type="file" id="polaroid-upload" accept="image/*" class="hidden">
                </div>
                <div class="polaroid-slider" id="polaroid-gallery">
                    <!-- JS ile dolacak -->
                </div>
            </section>

            <!-- Müzik Player -->
            <section class="premium-card">
                <div class="card-title"><i class="fa-solid fa-wave-square"></i> Aşk Radyosu</div>
                <div style="display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 20px;">
                    <div style="display: flex; gap: 15px; align-items: center;">
                        <div style="width: 50px; height: 50px; background: var(--accent); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px;"><i class="fa-solid fa-music"></i></div>
                        <div>
                            <p style="font-weight: 600;">Slow & Akustik</p>
                            <small style="color:var(--text-dim)">Canlı Yayın</small>
                        </div>
                    </div>
                    <button id="play-pause-btn" style="width: 45px; height: 45px; border-radius: 50%; border: none; background: #fff; color: #000; cursor: pointer;"><i class="fa-solid fa-play"></i></button>
                </div>
                <audio id="bg-music">
                    <source src="https://listen.powerapp.com.tr/powerturkakustik/mpeg/icecast.audio" type="audio/mpeg">
                </audio>
            </section>

            <!-- Mektup Kasası -->
            <section class="premium-card">
                <div class="card-title" style="justify-content: space-between;">
                    <span><i class="fa-solid fa-vault"></i> Mektup Kasası</span>
                    <button id="add-letter-btn" style="background:none; border:none; color:var(--accent); cursor:pointer; font-size: 20px;"><i class="fa-solid fa-feather-pointed"></i></button>
                </div>
                <div id="letter-list" style="display: flex; flex-direction: column; gap: 10px;">
                    <!-- JS -->
                </div>
            </section>

            <!-- Diğer Özellikler (Kısa Liste) -->
            <section style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <button class="premium-card" id="quiz-btn" style="text-align: center; border: none; cursor: pointer;">
                    <i class="fa-solid fa-gamepad" style="font-size: 24px; color: var(--accent); margin-bottom: 8px; display: block;"></i>
                    <span style="font-size: 14px; font-weight: 600;">Aşk Testi</span>
                </button>
                <button class="premium-card" id="add-place-btn" style="text-align: center; border: none; cursor: pointer;">
                    <i class="fa-solid fa-map-location-dot" style="font-size: 24px; color: var(--secondary); margin-bottom: 8px; display: block;"></i>
                    <span style="font-size: 14px; font-weight: 600;">Haritamız</span>
                </button>
            </section>

            <!-- Başarımlar -->
            <section class="premium-card">
                <div class="card-title" style="justify-content: center;"><i class="fa-solid fa-trophy"></i> Koleksiyonumuz</div>
                <div id="achievements-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 10px;">
                    <!-- JS -->
                </div>
            </section>

        </main>
    </div>

    <!-- Modals -->
    <div id="countdown-modal" class="modal">
        <div class="modal-content">
            <h3 class="m-b-10">Geri Sayım Ayarla</h3>
            <input type="text" id="cd-title-input" placeholder="Başlık" style="width: 100%; padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 15px; margin-bottom: 12px;">
            <input type="datetime-local" id="cd-date-input" style="width: 100%; padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 15px; margin-bottom: 20px;">
            <button id="save-countdown-btn" class="action-btn">Kaydet</button>
            <button id="close-countdown-modal" style="width: 100%; background: none; border: none; color: var(--text-dim); margin-top: 15px; cursor: pointer;">Kapat</button>
        </div>
    </div>

    <!-- Letter Create Modal -->
    <div id="letter-modal" class="modal">
        <div class="modal-content">
            <h3 class="m-b-10">Mektup Yaz</h3>
            <input type="text" id="letter-title" placeholder="Başlık" style="width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; margin-bottom: 10px;">
            <textarea id="letter-content" rows="4" placeholder="Mesajın..." style="width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; margin-bottom: 10px;"></textarea>
            <input type="date" id="letter-unlock" style="width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; margin-bottom: 20px;">
            <button id="save-letter-btn" class="action-btn">Mühürle & Gönder</button>
            <button id="close-letter-modal" style="width: 100%; background: none; border: none; color: var(--text-dim); margin-top: 15px; cursor: pointer;">Vazgeç</button>
        </div>
    </div>

    <!-- Polaroid Detail Modal -->
    <div id="polaroid-modal" class="modal">
        <div class="modal-content text-center">
            <img id="polaroid-detail-img" src="" style="width: 100%; border-radius: 15px; margin-bottom: 15px;">
            <p id="polaroid-detail-note" style="font-family: 'Dancing Script'; font-size: 24px; color: var(--accent);"></p>
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button id="delete-polaroid-btn" style="flex: 1; padding: 10px; background: rgba(255,0,0,0.2); border: none; color: #ff4d4d; border-radius: 12px;">Sil</button>
                <button id="close-polaroid-btn" style="flex: 1; padding: 10px; background: rgba(255,255,255,0.1); border: none; color: #fff; border-radius: 12px;">Kapat</button>
            </div>
        </div>
    </div>

    <canvas id="fireworks-canvas" style="position:fixed; top:0; left:0; pointer-events:none; z-index:2000;"></canvas>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').then(() => console.log('SW Başarılı'));
        }
    </script>
</body>
</html>
